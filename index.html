<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VANFLORA</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@200;400&display=swap" rel="stylesheet">
</head>
<body>

    <div class="scanner-line"></div> <!-- The "Crazy" new element -->
    <div id="spotlight"></div>

    <div class="main-wrapper">
        <h1 class="glitch">VANFLORA</h1>
        <p>the foundation is shifting.</p>
    </div>

    <div id="secret-message">THE RITUAL BEGINS SOON.</div>

    <script>
        const spotlight = document.getElementById('spotlight');
        const secret = document.getElementById('secret-message');
        let idleTimer, fadeTimer;

        document.addEventListener('mousemove', (e) => {
            spotlight.style.left = e.clientX + 'px';
            spotlight.style.top = e.clientY + 'px';
            
            secret.classList.remove('revealed');
            clearTimeout(idleTimer);
            clearTimeout(fadeTimer);
            
            idleTimer = setTimeout(() => {
                secret.classList.add('revealed');
                fadeTimer = setTimeout(() => { secret.classList.remove('revealed'); }, 4000); 
            }, 3000);
        });
    </script>
</body>
</html>
